name: Archive merged PR branch changes

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  archive-branch-changes:
    name: Archive branch changes on main
    if: github.event.pull_request.merged == true && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy changed files and generate AI explanation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const { execFileSync } = require("child_process");

          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const pr = event.pull_request;
          const repo = process.env.GITHUB_REPOSITORY;
          const token = process.env.GITHUB_TOKEN;
          const apiKey = process.env.GROQ_API_KEY;

          const FALLBACK_MODELS = [
            process.env.GROQ_MODEL,
            "qwen/qwen3.6-27b",
            "openai/gpt-oss-120b",
            "openai/gpt-oss-20b",
          ].filter(Boolean);

          const NON_CHAT_MODEL = /(whisper|guard|orpheus|playai|tts|speech|embedding|moderation)/i;
          let modelCatalogPromise;

          const safeName = (value) =>
            String(value || "unknown")
              .toLowerCase()
              .replace(/[^a-z0-9._-]+/g, "-")
              .replace(/^-+|-+$/g, "") || "unknown";

          const branchName = pr.head.ref || `pr-${pr.number}`;
          const safeBranchName = safeName(branchName);
          const archiveRoot = safeBranchName;
          const changedFilesRoot = path.join(archiveRoot, "files");
          const explanationPath = path.join(archiveRoot, "AI_EXPLANATION.md");
          const metadataPath = path.join(archiveRoot, "PR_METADATA.md");
          const baseSha = pr.base?.sha;

          async function githubGet(url) {
            const response = await fetch(url, {
              headers: {
                authorization: `Bearer ${token}`,
                accept: "application/vnd.github+json",
                "x-github-api-version": "2022-11-28",
              },
            });

            if (!response.ok) {
              throw new Error(`GitHub API failed: ${response.status} ${await response.text()}`);
            }

            return response.json();
          }

          async function getChangedFiles() {
            const files = [];
            let page = 1;

            while (true) {
              const url = `https://api.github.com/repos/${repo}/pulls/${pr.number}/files?per_page=100&page=${page}`;
              const pageFiles = await githubGet(url);
              files.push(...pageFiles);

              if (pageFiles.length < 100) break;
              page += 1;
            }

            return files;
          }

          function resetDirectory(directory) {
            fs.rmSync(directory, { recursive: true, force: true });
            fs.mkdirSync(directory, { recursive: true });
          }

          function copyChangedFiles(files) {
            const copied = [];
            const deleted = [];
            const skipped = [];

            for (const file of files) {
              if (file.status === "removed") {
                deleted.push(file.filename);
                continue;
              }

              if (!fs.existsSync(file.filename) || !fs.statSync(file.filename).isFile()) {
                skipped.push(file.filename);
                continue;
              }

              const destination = path.join(changedFilesRoot, file.filename);
              fs.mkdirSync(path.dirname(destination), { recursive: true });
              fs.copyFileSync(file.filename, destination);
              copied.push(file.filename);
            }

            return { copied, deleted, skipped };
          }

          function pathExistsInGit(ref, filename) {
            try {
              execFileSync("git", ["cat-file", "-e", `${ref}:${filename}`], { stdio: "ignore" });
              return true;
            } catch {
              return false;
            }
          }

          function restoreFromBase(filename) {
            if (!baseSha || !pathExistsInGit(baseSha, filename)) {
              fs.rmSync(filename, { recursive: true, force: true });
              return "removed because no pre-merge version was found";
            }

            fs.mkdirSync(path.dirname(filename), { recursive: true });
            execFileSync("git", ["checkout", baseSha, "--", filename], { stdio: "inherit" });
            return "restored to the pre-merge main version";
          }

          function cleanupMergedOriginals(files) {
            const cleanup = [];

            for (const file of files) {
              if (file.filename.startsWith(`${archiveRoot}/`)) {
                cleanup.push({ file: file.filename, action: "kept archived file" });
                continue;
              }

              if (file.status === "added" || file.status === "copied") {
                fs.rmSync(file.filename, { recursive: true, force: true });
                cleanup.push({ file: file.filename, action: "removed merged branch-only file from main root" });
                continue;
              }

              if (file.status === "renamed") {
                fs.rmSync(file.filename, { recursive: true, force: true });
                const previous = file.previous_filename || file.filename;
                const action = restoreFromBase(previous);
                cleanup.push({
                  file: file.filename,
                  previous_filename: previous,
                  action: `removed renamed path and ${action}`,
                });
                continue;
              }

              if (file.status === "modified" || file.status === "changed" || file.status === "removed") {
                const action = restoreFromBase(file.filename);
                cleanup.push({ file: file.filename, action });
                continue;
              }

              cleanup.push({ file: file.filename, action: `no cleanup rule for status: ${file.status}` });
            }

            return cleanup;
          }

          function readTextPreview(filename) {
            try {
              const stats = fs.statSync(filename);
              if (stats.size > 120000) {
                return "[file is too large to include in the AI prompt]";
              }

              const content = fs.readFileSync(filename);
              if (content.includes(0)) {
                return "[binary file omitted from AI prompt]";
              }

              return content.toString("utf8").slice(0, 12000);
            } catch {
              return "[file content unavailable]";
            }
          }

          function buildMetadata(files, archiveInfo, cleanupInfo) {
            const fileRows = files.map((file) => {
              const previous = file.previous_filename ? ` (renamed from ${file.previous_filename})` : "";
              return `- \`${file.filename}\` - ${file.status}${previous}, +${file.additions || 0}/-${file.deletions || 0}`;
            }).join("\n") || "- No changed files were reported.";

            const cleanupRows = cleanupInfo.map((item) => {
              const previous = item.previous_filename ? `, previous path: \`${item.previous_filename}\`` : "";
              return `- \`${item.file}\` - ${item.action}${previous}`;
            }).join("\n") || "- No cleanup actions were needed.";

            return [
              `# PR Archive - ${branchName}`,
              "",
              `- PR: [#${pr.number} ${pr.title}](${pr.html_url})`,
              `- Source branch: \`${branchName}\``,
              `- Merged by: @${pr.merged_by?.login || "unknown"}`,
              `- Author: @${pr.user?.login || "unknown"}`,
              `- Merged at: ${pr.merged_at}`,
              `- Merge commit: \`${pr.merge_commit_sha || "unknown"}\``,
              "",
              "## Files Changed",
              "",
              fileRows,
              "",
              "## Archive Notes",
              "",
              `- Copied files are stored in \`${changedFilesRoot}/\`.`,
              `- Copied: ${archiveInfo.copied.length}`,
              `- Deleted in PR: ${archiveInfo.deleted.length}`,
              `- Skipped: ${archiveInfo.skipped.length}`,
              "",
              "## Main Cleanup",
              "",
              "After archiving, the workflow removes branch-only files from the root of `main` and restores existing files to their pre-merge `main` version.",
              "",
              cleanupRows,
            ].join("\n");
          }

          function buildPrompt(files, archiveInfo) {
            const fileDetails = files.map((file) => {
              const archivedPath = path.join(changedFilesRoot, file.filename);
              const content = archiveInfo.copied.includes(file.filename)
                ? readTextPreview(archivedPath)
                : "[file was deleted, skipped, or unavailable]";

              return {
                filename: file.filename,
                previous_filename: file.previous_filename || null,
                status: file.status,
                additions: file.additions,
                deletions: file.deletions,
                changes: file.changes,
                patch: file.patch ? file.patch.slice(0, 4000) : "[patch unavailable]",
                content,
              };
            });

            return `
          You are documenting code changes for a programming practice repository.

          Pull request:
          - Title: ${pr.title}
          - Number: ${pr.number}
          - Author: ${pr.user?.login || "unknown"}
          - Source branch: ${branchName}
          - Merged at: ${pr.merged_at}
          - URL: ${pr.html_url}

          PR description:
          ${pr.body || "No description provided."}

          Changed files and code:
          ${JSON.stringify(fileDetails, null, 2)}

          Write a useful markdown explanation of the code that was added or changed.
          Use this exact structure:

          # AI Explanation - ${branchName}

          ## Overview

          ## File-by-File Explanation

          ## Important Concepts

          ## How to Run or Review

          ## Notes

          Keep it concise, accurate, and beginner-friendly. Do not invent behavior that is not visible in the code or patch.
          `;
          }

          function buildFallbackExplanation(files) {
            const fileList = files.map((file) =>
              `- \`${file.filename}\` - ${file.status}, +${file.additions || 0}/-${file.deletions || 0}`
            ).join("\n") || "- No files were changed.";

            return [
              `# AI Explanation - ${branchName}`,
              "",
              "## Overview",
              "",
              `This archive was created after PR #${pr.number} was merged into main. AI generation was unavailable, so this file contains a metadata-based summary.`,
              "",
              "## File-by-File Explanation",
              "",
              fileList,
              "",
              "## Important Concepts",
              "",
              "Review the archived files directly for the implementation details.",
              "",
              "## How to Run or Review",
              "",
              `Open the files under \`${changedFilesRoot}/\` and compare them with the PR linked in the metadata file.`,
              "",
              "## Notes",
              "",
              `PR: [#${pr.number} ${pr.title}](${pr.html_url})`,
            ].join("\n");
          }

          async function callGroq(model, messages, maxTokens) {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
              method: "POST",
              headers: {
                authorization: `Bearer ${apiKey}`,
                "content-type": "application/json",
              },
              body: JSON.stringify({
                model,
                messages,
                temperature: 0.2,
                max_completion_tokens: maxTokens,
              }),
            });

            if (!response.ok) {
              const body = await response.text();
              const isRateLimit = response.status === 429 || body.includes("rate_limit") || body.includes("Rate limit");
              throw Object.assign(new Error(`Groq API failed [${model}]: ${response.status} ${body}`), { isRateLimit });
            }

            const data = await response.json();
            const text = data.choices?.[0]?.message?.content?.trim();
            if (!text) throw new Error(`Empty response from model: ${model}`);
            return text;
          }

          async function getAvailableModels(maxTokens) {
            try {
              modelCatalogPromise ||= fetch("https://api.groq.com/openai/v1/models", {
                headers: { authorization: `Bearer ${apiKey}` },
              }).then(async (response) => {
                if (!response.ok) {
                  throw new Error(`Groq models API failed: ${response.status} ${await response.text()}`);
                }
                return response.json();
              });

              const catalog = await modelCatalogPromise;
              const preferredOrder = new Map(FALLBACK_MODELS.map((model, index) => [model, index]));
              const models = (catalog.data || [])
                .filter((model) =>
                  model.active !== false &&
                  model.id &&
                  !NON_CHAT_MODEL.test(model.id) &&
                  (!model.context_window || model.context_window >= maxTokens)
                )
                .sort((a, b) => {
                  const aRank = preferredOrder.get(a.id) ?? FALLBACK_MODELS.length;
                  const bRank = preferredOrder.get(b.id) ?? FALLBACK_MODELS.length;
                  return aRank - bRank || (b.context_window || 0) - (a.context_window || 0);
                })
                .map((model) => model.id);

              return models.length ? models : FALLBACK_MODELS;
            } catch (error) {
              console.warn(`Could not discover Groq models (${error.message}); using fallback models.`);
              return FALLBACK_MODELS;
            }
          }

          async function generateWithGroq(prompt) {
            if (!apiKey) {
              throw new Error("Missing GROQ_API_KEY repository secret.");
            }

            const messages = [
              { role: "system", content: "You explain programming practice code changes clearly and accurately." },
              { role: "user", content: prompt },
            ];

            const models = await getAvailableModels(3072);
            for (const model of models) {
              try {
                console.log(`Trying Groq model: ${model}`);
                return await callGroq(model, messages, 3072);
              } catch (error) {
                console.warn(`Model ${model} failed: ${error.message}`);
              }
            }

            throw new Error("All Groq models failed.");
          }

          async function main() {
            const files = await getChangedFiles();
            resetDirectory(archiveRoot);

            const archiveInfo = copyChangedFiles(files);
            const cleanupInfo = cleanupMergedOriginals(files);
            const metadata = buildMetadata(files, archiveInfo, cleanupInfo);
            fs.writeFileSync(metadataPath, `${metadata}\n`, "utf8");

            let explanation;
            try {
              explanation = await generateWithGroq(buildPrompt(files, archiveInfo));
            } catch (error) {
              console.warn(`AI explanation unavailable (${error.message}). Writing fallback explanation.`);
              explanation = buildFallbackExplanation(files);
            }

            fs.writeFileSync(explanationPath, `${explanation}\n`, "utf8");
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit archive to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "Archive merged PR branch changes"
            git push origin main
          fi
