name: Archive PR code

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

jobs:
  archive-pr-code:
    name: Archive PR files to code branch
    if: github.event.pull_request.draft == false && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout or create code branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --filter=blob:none --no-checkout \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" repo
          cd repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin code > /dev/null 2>&1; then
            git fetch origin code
            git checkout code
          else
            git checkout --orphan code
            git rm -rf . > /dev/null 2>&1 || true
            git commit --allow-empty -m "Initialize code branch"
            git push origin code
          fi

      - name: Copy PR files and generate AI explanation
        working-directory: repo
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const pr = event.pull_request;
          const repo = process.env.GITHUB_REPOSITORY;
          const token = process.env.GITHUB_TOKEN;
          const apiKey = process.env.GROQ_API_KEY;
          const headSha = pr.head.sha;

          const FALLBACK_MODELS = [
            process.env.GROQ_MODEL,
            "qwen/qwen3.6-27b",
            "openai/gpt-oss-120b",
            "openai/gpt-oss-20b",
          ].filter(Boolean);

          const NON_CHAT_MODEL = /(whisper|guard|orpheus|playai|tts|speech|embedding|moderation)/i;
          let modelCatalogPromise;

          const safeName = (value) =>
            String(value || "unknown")
              .toLowerCase()
              .replace(/[^a-z0-9._-]+/g, "-")
              .replace(/^-+|-+$/g, "") || "unknown";

          const encodeContentPath = (filename) =>
            filename.split("/").map(encodeURIComponent).join("/");

          const branchName = pr.head.ref || `pr-${pr.number}`;
          const safeBranchName = safeName(branchName);
          const archiveRoot = safeBranchName;
          const changedFilesRoot = path.join(archiveRoot, "files");
          const explanationPath = path.join(archiveRoot, "AI_EXPLANATION.md");
          const metadataPath = path.join(archiveRoot, "PR_METADATA.md");

          async function githubGet(url) {
            const response = await fetch(url, {
              headers: {
                authorization: `Bearer ${token}`,
                accept: "application/vnd.github+json",
                "x-github-api-version": "2022-11-28",
              },
            });

            if (!response.ok) {
              throw new Error(`GitHub API failed: ${response.status} ${await response.text()}`);
            }

            return response.json();
          }

          async function getChangedFiles() {
            const files = [];
            let page = 1;

            while (true) {
              const url = `https://api.github.com/repos/${repo}/pulls/${pr.number}/files?per_page=100&page=${page}`;
              const pageFiles = await githubGet(url);
              files.push(...pageFiles);

              if (pageFiles.length < 100) break;
              page += 1;
            }

            return files;
          }

          async function getFileContent(filename) {
            const url = `https://api.github.com/repos/${repo}/contents/${encodeContentPath(filename)}?ref=${headSha}`;
            try {
              const data = await githubGet(url);
              if (data.encoding === "base64" && data.content) {
                return Buffer.from(data.content, "base64");
              }
            } catch (error) {
              console.warn(`Skipping ${filename}: ${error.message}`);
            }
            return null;
          }

          function resetDirectory(directory) {
            fs.rmSync(directory, { recursive: true, force: true });
            fs.mkdirSync(directory, { recursive: true });
          }

          async function copyChangedFiles(files) {
            const copied = [];
            const deleted = [];
            const skipped = [];

            for (const file of files) {
              if (file.status === "removed") {
                deleted.push(file.filename);
                continue;
              }

              const content = await getFileContent(file.filename);
              if (!content) {
                skipped.push(file.filename);
                continue;
              }

              const destination = path.join(changedFilesRoot, file.filename);
              fs.mkdirSync(path.dirname(destination), { recursive: true });
              fs.writeFileSync(destination, content);
              copied.push(file.filename);
            }

            return { copied, deleted, skipped };
          }

          function readTextPreview(filename) {
            try {
              const stats = fs.statSync(filename);
              if (stats.size > 120000) {
                return "[file is too large to include in the AI prompt]";
              }

              const content = fs.readFileSync(filename);
              if (content.includes(0)) {
                return "[binary file omitted from AI prompt]";
              }

              return content.toString("utf8").slice(0, 12000);
            } catch {
              return "[file content unavailable]";
            }
          }

          function buildMetadata(files, archiveInfo) {
            const fileRows = files.map((file) => {
              const previous = file.previous_filename ? ` (renamed from ${file.previous_filename})` : "";
              return `- \`${file.filename}\` - ${file.status}${previous}, +${file.additions || 0}/-${file.deletions || 0}`;
            }).join("\n") || "- No changed files were reported.";

            return [
              `# PR Code Archive - ${branchName}`,
              "",
              `- PR: [#${pr.number} ${pr.title}](${pr.html_url})`,
              `- Source branch: \`${branchName}\``,
              `- Target branch: \`${pr.base.ref}\``,
              `- Author: @${pr.user?.login || "unknown"}`,
              `- PR head SHA: \`${headSha}\``,
              `- Last updated: ${new Date().toISOString()}`,
              "",
              "## Files Changed",
              "",
              fileRows,
              "",
              "## Archive Notes",
              "",
              `- This folder is generated on the \`code\` branch when the PR is opened or updated.`,
              `- Copied files are stored in \`${changedFilesRoot}/\`.`,
              `- Copied: ${archiveInfo.copied.length}`,
              `- Deleted in PR: ${archiveInfo.deleted.length}`,
              `- Skipped: ${archiveInfo.skipped.length}`,
            ].join("\n");
          }

          function buildPrompt(files, archiveInfo) {
            const fileDetails = files.map((file) => {
              const archivedPath = path.join(changedFilesRoot, file.filename);
              const content = archiveInfo.copied.includes(file.filename)
                ? readTextPreview(archivedPath)
                : "[file was deleted, skipped, or unavailable]";

              return {
                filename: file.filename,
                previous_filename: file.previous_filename || null,
                status: file.status,
                additions: file.additions,
                deletions: file.deletions,
                changes: file.changes,
                patch: file.patch ? file.patch.slice(0, 4000) : "[patch unavailable]",
                content,
              };
            });

            return `
            You are reviewing a GitHub pull request for a programming practice repository.
              PR Metadata:
              - Title: ${pr.title}
              - Number: ${pr.number}
              - Author: ${pr.user?.login || "unknown"}
              - Source branch: ${branchName}
              - Target branch: ${pr.base.ref}
              - URL: ${pr.html_url}
                          
              PR Description:
              ${pr.body || "No description provided."}
              
              Changed Files and Diffs:
              ${JSON.stringify(fileDetails, null, 2)}
              
              Task:
              
              Analyze the complete pull request as one cohesive change, not as individual file modifications.
              
              Your goal is to understand:
              - What feature, fix, or refactoring this PR introduces.
              - How the implementation works across the repository.
              - The overall logic and design decisions.
              - Any important tradeoffs or review considerations.
              
              Avoid:
              - Explaining every file individually.
              - Repeating similar information for multiple files.
              - Listing obvious line-by-line code changes.
              - Adding assumptions about behavior that is not visible in the diff.
              
              Only mention individual files when they are essential to explaining the overall implementation.
              
              Generate the following markdown:
              
              # AI Explanation - ${branchName}
              
              ## Summary
              A short overview of what this PR accomplishes.
              
              ## Approach
              Describe the overall implementation strategy and how the different changes work together.
              
              ## Key Logic
              Explain the important algorithms, data flow, architectural decisions, or implementation details introduced by the PR.
              
              ## Complexity and Tradeoffs
              Mention any performance implications, maintainability considerations, or notable design tradeoffs visible from the code.
              
              ## Run or Review Notes
              Include anything reviewers should pay attention to, testing considerations, or setup notes if applicable. If nothing special exists, state "None."
              
              Keep the explanation concise, technically accurate, and beginner-friendly. Focus on the PR as a whole rather than the individual files.
          `;
          }

          function buildFallbackExplanation(files) {
            const fileList = files.map((file) =>
              `- \`${file.filename}\` - ${file.status}, +${file.additions || 0}/-${file.deletions || 0}`
            ).join("\n") || "- No files were changed.";

            return [
              `# AI Explanation - ${branchName}`,
              "",
              "## Overview",
              "",
              `This archive was created from PR #${pr.number}. AI generation was unavailable, so this file contains a metadata-based summary.`,
              "",
              "## Approach",
              "",
              fileList,
              "",
              "## Key Logic",
              "",
              "Review the archived files directly for the implementation details.",
              "",
              "## Complexity and Tradeoffs",
              "",
              "A detailed AI summary was unavailable, so complexity and tradeoffs were not inferred.",
              "",
              "## Run or Review Notes",
              "",
              `Open the files under \`${changedFilesRoot}/\` and compare them with the PR linked in the metadata file.`,
            ].join("\n");
          }

          async function callGroq(model, messages, maxTokens) {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
              method: "POST",
              headers: {
                authorization: `Bearer ${apiKey}`,
                "content-type": "application/json",
              },
              body: JSON.stringify({
                model,
                messages,
                temperature: 0.2,
                max_completion_tokens: maxTokens,
              }),
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Groq API failed [${model}]: ${response.status} ${body}`);
            }

            const data = await response.json();
            const text = data.choices?.[0]?.message?.content?.trim();
            if (!text) throw new Error(`Empty response from model: ${model}`);
            return text;
          }

          async function getAvailableModels(maxTokens) {
            try {
              modelCatalogPromise ||= fetch("https://api.groq.com/openai/v1/models", {
                headers: { authorization: `Bearer ${apiKey}` },
              }).then(async (response) => {
                if (!response.ok) {
                  throw new Error(`Groq models API failed: ${response.status} ${await response.text()}`);
                }
                return response.json();
              });

              const catalog = await modelCatalogPromise;
              const preferredOrder = new Map(FALLBACK_MODELS.map((model, index) => [model, index]));
              const models = (catalog.data || [])
                .filter((model) =>
                  model.active !== false &&
                  model.id &&
                  !NON_CHAT_MODEL.test(model.id) &&
                  (!model.context_window || model.context_window >= maxTokens)
                )
                .sort((a, b) => {
                  const aRank = preferredOrder.get(a.id) ?? FALLBACK_MODELS.length;
                  const bRank = preferredOrder.get(b.id) ?? FALLBACK_MODELS.length;
                  return aRank - bRank || (b.context_window || 0) - (a.context_window || 0);
                })
                .map((model) => model.id);

              return models.length ? models : FALLBACK_MODELS;
            } catch (error) {
              console.warn(`Could not discover Groq models (${error.message}); using fallback models.`);
              return FALLBACK_MODELS;
            }
          }

          async function generateWithGroq(prompt) {
            if (!apiKey) {
              throw new Error("Missing GROQ_API_KEY repository secret.");
            }

            const messages = [
              { role: "system", content: "You explain programming practice code changes clearly and accurately." },
              { role: "user", content: prompt },
            ];

            const models = await getAvailableModels(3072);
            for (const model of models) {
              try {
                console.log(`Trying Groq model: ${model}`);
                return await callGroq(model, messages, 3072);
              } catch (error) {
                console.warn(`Model ${model} failed: ${error.message}`);
              }
            }

            throw new Error("All Groq models failed.");
          }

          async function main() {
            const files = await getChangedFiles();
            resetDirectory(archiveRoot);

            const archiveInfo = await copyChangedFiles(files);
            const metadata = buildMetadata(files, archiveInfo);
            fs.writeFileSync(metadataPath, `${metadata}\n`, "utf8");

            let explanation;
            try {
              explanation = await generateWithGroq(buildPrompt(files, archiveInfo));
            } catch (error) {
              console.warn(`AI explanation unavailable (${error.message}). Writing fallback explanation.`);
              explanation = buildFallbackExplanation(files);
            }

            fs.writeFileSync(explanationPath, `${explanation}\n`, "utf8");
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit archive to code branch
        working-directory: repo
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No code archive changes to commit."
          else
            git commit -m "Archive PR #${{ github.event.pull_request.number }} code"
            git push origin code
          fi
